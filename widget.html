<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zeno</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand:     #0ACF83;
    --brand-dk:  #07A566;
    --brand-dim: rgba(10,207,131,0.12);
    --bg:        #0D0D0D;
    --surface:   #161616;
    --surface2:  #1E1E1E;
    --border:    rgba(255,255,255,0.07);
    --text:      #F0F0F0;
    --muted:     #777;
    --radius:    16px;
    --font:      'DM Sans', sans-serif;
    --mono:      'DM Mono', monospace;
  }

 body {
    font-family: var(--font);
    background: var(--bg);
    min-height: 100vh;
    overflow: auto;
  }

  /* subtle grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(10,207,131,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(10,207,131,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* glow blob */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(10,207,131,0.06) 0%, transparent 70%);
    bottom: -100px; right: -100px;
    pointer-events: none;
  }

  /* ── CHAT BUTTON ── */
  #chat-btn {
    position: fixed; bottom: 28px; right: 28px;
    width: 60px; height: 60px;
    background: var(--brand);
    border: none; border-radius: 50%;
    cursor: pointer; z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 0 rgba(10,207,131,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  #chat-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 0 8px rgba(10,207,131,0.15);
  }
  #chat-btn svg { width: 26px; height: 26px; fill: #0D0D0D; transition: opacity 0.2s; }
  #chat-btn .icon-close { display: none; }
  #chat-btn.open .icon-chat  { display: none; }
  #chat-btn.open .icon-close { display: block; }

  /* ── CHAT BOX ── */
  #chat-box {
    position: fixed; bottom: 102px; right: 28px;
    width: 370px; height: 76vh; max-height: 580px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex; flex-direction: column;
    z-index: 999; overflow: hidden;
    opacity: 0; pointer-events: none;
    transform: translateY(16px) scale(0.97);
    transition: opacity 0.25s, transform 0.25s;
  }
  #chat-box.open {
    opacity: 1; pointer-events: all;
    transform: translateY(0) scale(1);
  }

  /* header */
  .chat-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--brand-dim);
    border: 1px solid rgba(10,207,131,0.3);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .avatar svg { width: 18px; height: 18px; fill: var(--brand); }
  .header-info { flex: 1; }
  .header-info h3 {
    font-size: 14px; font-weight: 600;
    color: var(--text); letter-spacing: -0.2px;
  }
  .status {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--brand); margin-top: 1px;
    font-family: var(--mono);
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--brand);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  /* messages */
  #messages {
    flex: 1; overflow-y: auto; padding: 20px 16px;
    display: flex; flex-direction: column; gap: 12px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row {
    display: flex; align-items: flex-end; gap: 8px;
    animation: fadeUp 0.2s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--brand-dim); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--brand); font-weight: 600;
  }
  .msg-row.user .msg-avatar {
    background: rgba(255,255,255,0.05);
    color: var(--muted);
  }

  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    font-size: 13.5px;
    line-height: 1.55;
    border-radius: 14px;
  }
  .bot  .bubble {
    background: var(--surface2);
    color: var(--text);
    border-radius: 4px 14px 14px 14px;
    border: 1px solid var(--border);
  }
  .user .bubble {
    background: var(--brand);
    color: #0D0D0D;
    font-weight: 500;
    border-radius: 14px 4px 14px 14px;
  }

  /* typing indicator */
  .typing .bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px 14px 14px 14px;
    padding: 12px 16px;
  }
  .dots { display: flex; gap: 4px; }
  .dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40%           { transform: translateY(-5px); opacity: 1; }
  }

  /* input row */
  .input-row {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center;
    flex-shrink: 0;
  }
  #msg-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 10px 16px;
    font-size: 13.5px;
    font-family: var(--font);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }
  #msg-input::placeholder { color: var(--muted); }
  #msg-input:focus { border-color: rgba(10,207,131,0.4); }

  #send-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--brand); border: none;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.15s;
  }
  #send-btn:hover { background: var(--brand-dk); transform: scale(1.05); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn svg { width: 16px; height: 16px; fill: #0D0D0D; }

  /* powered by */
  .powered {
    text-align: center; padding: 8px;
    font-size: 10px; color: var(--muted);
    font-family: var(--mono); letter-spacing: 0.5px;
    border-top: 1px solid var(--border);
  }
  .powered span { color: var(--brand); }
</style>
</head>
<body>

<!-- Chat toggle button -->
<button id="chat-btn" onclick="toggleChat()" aria-label="Open chat">
  <svg class="icon-chat" viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2z"/></svg>
  <svg class="icon-close" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" fill="none" stroke="#0D0D0D" stroke-width="2.5" stroke-linecap="round"/></svg>
</button>

<!-- Chat window -->
<div id="chat-box">
  <div class="chat-header">
    <div class="avatar">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 110 20A10 10 0 0112 2zm0 2a8 8 0 100 16A8 8 0 0012 4zm0 3a1.5 1.5 0 110 3 1.5 1.5 0 010-3zm0 5c2.21 0 4 .9 4 2v1H8v-1c0-1.1 1.79-2 4-2z"/></svg>
    </div>
    <div class="header-info">
      <h3>Zeno Assistant</h3>
      <div class="status"><span class="status-dot"></span>online</div>
    </div>
  </div>

  <div id="messages">
    <div class="msg-row bot">
      <div class="msg-avatar">Z</div>
      <div class="bubble">Welcome! Loading...</div>
    </div>
  </div>

  <div class="input-row">
    <input id="msg-input" placeholder="Type a message..."
      onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); sendMsg(); }"/>
    <button id="send-btn" onclick="sendMsg()" aria-label="Send">
      <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
  <div class="powered">powered by <span>ZENO</span></div>
</div>

<script>
  let sessionId = crypto.randomUUID();
  let isTyping  = false;
  let clientId  = new URLSearchParams(window.location.search).get('client_id') || 'demo_client';

async function loadConfig() {
  const res  = await fetch('/widget-config?client_id=' + clientId);
  const cfg  = await res.json();
  document.querySelector('.header-info h3').textContent = cfg.bot_name;
  document.querySelector('.chat-header').style.setProperty('--brand', cfg.brand_color);
  document.querySelector('#chat-btn').style.background   = cfg.brand_color;
  document.querySelector('#send-btn').style.background   = cfg.brand_color;
  document.querySelector('.status-dot').style.background = cfg.brand_color;
  document.querySelector('.status').style.color          = cfg.brand_color;
  document.querySelector('#messages .bubble').textContent = cfg.greeting;
}
loadConfig();

  function toggleChat() {
    const box = document.getElementById('chat-box');
    const btn = document.getElementById('chat-btn');
    box.classList.toggle('open');
    btn.classList.toggle('open');
    if (box.classList.contains('open')) {
      setTimeout(() => document.getElementById('msg-input').focus(), 300);
    }
  }

  function addMsg(text, role) {
    const messages = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;

    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = role === 'bot' ? 'Z' : 'U';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    row.appendChild(av);
    row.appendChild(bubble);
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
    return row;
  }

  function showTyping() {
    const messages = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row bot typing';
    row.id = 'typing-indicator';
    row.innerHTML = `
      <div class="msg-avatar">Z</div>
      <div class="bubble"><div class="dots">
        <span></span><span></span><span></span>
      </div></div>`;
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMsg() {
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if (!text || isTyping) return;
    input.value = '';
    isTyping = true;

    addMsg(text, 'user');
    showTyping();

    const form = new FormData();
    form.append('message',    text);
    form.append('session_id', sessionId);
    form.append('channel',    'web');
    form.append('client_id', clientId);

    try {
      const res  = await fetch('/chat', { method: 'POST', body: form });
      const data = await res.json();
      hideTyping();
      addMsg(data.reply, 'bot');
    } catch(e) {
      hideTyping();
      addMsg('Something went wrong. Please try again.', 'bot');
    }
    isTyping = false;
  }
</script>
</body>
</html>
